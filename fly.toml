app = "petstore-api"

primary_region = "sjc"

kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  # You deploy your own GHCR image — Fly will NOT build a Dockerfile
  image = "ghcr.io/ramonalcantaraarceo/petstore-api:latest"

[env]
  PORT = "8000"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  # Public HTTP/HTTPS
  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Health checks (FastAPI-friendly)
  [services.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

  [[services.http_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/docs"   # FastAPI always exposes this
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1
