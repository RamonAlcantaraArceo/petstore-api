name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: "3.14"

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: "3.14"

      - name: mypy
        run: mypy app/

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      STORAGE_MODE: memory
      API_KEY: test-api-key
      EXPECTED_PYTHON_VERSIONS: "3.14"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: "3.14"
          install-allure: true

      - name: Run tests
        run: |
          pytest tests/unit/ tests/integration/ tests/system/ \
            --cov=app --cov-report=xml \
            -p allure_pytest --alluredir=allure-results/

      - name: Write Allure executor and environment metadata
        if: always()
        run: |
          mkdir -p allure-meta-results allure-results

          cat > allure-meta-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          cat > allure-meta-results/environment.properties <<EOF
          Python Versions=${EXPECTED_PYTHON_VERSIONS}
          Workflow=${{ github.workflow }}
          Repository=${{ github.repository }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Run ID=${{ github.run_id }}
          Run Number=${{ github.run_number }}
          Storage Mode=${STORAGE_MODE}
          EOF

          cp allure-meta-results/executor.json allure-results/executor.json
          cp allure-meta-results/environment.properties allure-results/environment.properties

      - name: Upload API test results and coverage
        uses: ./.github/actions/upload-results
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          junit-file: junit.xml
          coverage-file: coverage.xml
          codecov-flags: api
          allure-results-path: allure-results/
          allure-artifact-name: allure-results

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Allure history workspace (CI)
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d gh-pages ]; then
            cp -R gh-pages/. allure-history/
          fi
          if [ -d allure-history/ci/history ]; then
            mkdir -p allure-results/history
            cp -R allure-history/ci/history/. allure-results/history/
          fi

      - name: Build Allure report with CI-only history
        if: always()
        run: |
          mkdir -p allure-history/ci
          allure generate allure-results --clean -o allure-history/ci

      - name: Publish CI Allure report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false