name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: "3.14"

      - name: ruff check
        run: uv run ruff check .

      - name: black check
        run: uv run black --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: "3.14"

      - name: mypy
        run: uv run mypy app/

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      STORAGE_MODE: memory
      API_KEY: test-api-key
      EXPECTED_PYTHON_VERSIONS: "3.14"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: "3.14"

      - name: Run tests
        run: |
          uv run pytest tests/unit/ tests/integration/ tests/system/ \
            --cov=app --cov-report=xml \
            -p allure_pytest --alluredir=allure-results/

      - name: Upload API test results and coverage
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/upload-results@main
        with:
          codecov-token: ${{ secrets.CODECOV_TOKEN }}
          junit-file: junit.xml
          coverage-file: coverage.xml
          codecov-flags: api
          allure-results-path: allure-results/
          allure-artifact-name: allure-results

  # --------------------------------------------------------------------------
  # Publish Allure Report
  # --------------------------------------------------------------------------
  allure-report:
    name: Publish Allure Report
    needs: [test]
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write
      pull-requests: write
      checks: write
    uses: RamonAlcantaraArceo/petstore-test-python/.github/workflows/allure-report.yml@main
    with:
      artifact-pattern: "allure-results"
      report-subpath: "ci"
      allure-report-name: "Petstore API Test Report"
      publish-report: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.publish_report == 'true' }}
    secrets:
      GH_PAGES_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-image:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false