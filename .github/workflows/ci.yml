name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system ruff black

      - name: ruff check
        run: ruff check .

      - name: black check
        run: black --check .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: mypy
        run: mypy app/

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      STORAGE_MODE: memory
      API_KEY: test-api-key
      EXPECTED_PYTHON_VERSIONS: "3.14"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: |
          uv pip install --system -e ".[dev]"

      - name: Run tests
        run: |
          pytest tests/unit/ tests/integration/ tests/system/ \
            --cov=app --cov-report=xml \
            -p allure_pytest --alluredir=allure-results/

      - name: Write Allure executor and environment metadata
        if: always()
        run: |
          mkdir -p allure-meta-results allure-results

          cat > allure-meta-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          cat > allure-meta-results/environment.properties <<EOF
          Python Versions=${EXPECTED_PYTHON_VERSIONS}
          Workflow=${{ github.workflow }}
          Repository=${{ github.repository }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Run ID=${{ github.run_id }}
          Run Number=${{ github.run_number }}
          Storage Mode=${STORAGE_MODE}
          EOF

          cp allure-meta-results/executor.json allure-results/executor.json
          cp allure-meta-results/environment.properties allure-results/environment.properties

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml
          report_type: test_results
          verbose: true
          fail_ci_if_error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
        continue-on-error: true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Allure history workspace (CI)
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d gh-pages ]; then
            cp -R gh-pages/. allure-history/
          fi
          if [ -d allure-history/ci/history ]; then
            mkdir -p allure-results/history
            cp -R allure-history/ci/history/. allure-results/history/
          fi

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.34.1
          curl -sSL -o allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build Allure report with CI-only history
        if: always()
        run: |
          mkdir -p allure-history/ci
          allure generate allure-results --clean -o allure-history/ci

      - name: Publish CI Allure report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ secrets.ECR_REGISTRY }}/petstore-api:${{ github.sha }}"
          docker build --target runtime -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
