name: Deploy to Fly.io Dev

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version to deploy (e.g. v1.2.3)"
        default: "latest"
        required: false
        type: string

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute build date
        id: vars
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Set image tag
        id: set_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      # Deploy using the pre-built GHCR image
      - name: Deploy to Fly.io
        run: |
          flyctl deploy \
            --config .fly/dev/fly.toml \
            --image ghcr.io/ramonalcantaraarceo/petstore-api:${{ steps.set_tag.outputs.tag }} \
            --remote-only \
            --env GIT_SHA=${{ github.sha }} \
            --env BUILD_DATE=${{ steps.vars.outputs.date }} \
            --env VERSION=${{ github.event.inputs.version }} \
            --debug \
            --verbose
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
