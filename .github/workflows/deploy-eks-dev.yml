name: Deploy to EKS Dev

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-eks-dev:
    name: Deploy to EKS Dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ vars.OIDC_ROLE_NAME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ vars.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install petstore-api ./helm/petstore-api \
            -f ./helm/petstore-api/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            --set image.repository=${{ vars.AWS_ACCOUNT_ID }}:.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/python/petstore-api \
            --wait --timeout 5m
