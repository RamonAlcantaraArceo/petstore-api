name: Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag (commit SHA) to deploy"
        required: true
        type: string

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging EKS
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPECTED_PYTHON_VERSIONS: "3.14"
      STORAGE_MODE: remote-staging
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_STAGING_CLUSTER_NAME }} \
            --region us-east-1

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        run: |
          helm upgrade --install petstore-api ./helm/petstore-api \
            -f ./helm/petstore-api/values-staging.yaml \
            --set image.tag=${{ inputs.image_tag }} \
            --set image.repository=${{ secrets.ECR_REGISTRY }}/petstore-api \
            --wait --timeout 5m

      - name: Set up Python for e2e tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install test dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run e2e tests against staging
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_URL }}
          API_KEY: ${{ secrets.STAGING_API_KEY }}
        run: |
          pytest tests/e2e/ --alluredir=allure-results/ -p allure_pytest

      - name: Write Allure executor and environment metadata
        if: always()
        run: |
          mkdir -p allure-meta-results allure-results

          cat > allure-meta-results/executor.json <<EOF
          {
            "name": "GitHub Actions",
            "type": "github",
            "buildName": "${{ github.workflow }} #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "buildUrl": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF

          cat > allure-meta-results/environment.properties <<EOF
          Python Versions=${EXPECTED_PYTHON_VERSIONS}
          Workflow=${{ github.workflow }}
          Repository=${{ github.repository }}
          Branch=${{ github.ref_name }}
          Commit=${{ github.sha }}
          Run ID=${{ github.run_id }}
          Run Number=${{ github.run_number }}
          Storage Mode=${STORAGE_MODE}
          Environment=staging
          EOF

          cp allure-meta-results/executor.json allure-results/executor.json
          cp allure-meta-results/environment.properties allure-results/environment.properties

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-staging
          path: allure-results/
        continue-on-error: true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Prepare Allure history workspace (staging)
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d gh-pages ]; then
            cp -R gh-pages/. allure-history/
          fi
          if [ -d allure-history/staging/history ]; then
            mkdir -p allure-results/history
            cp -R allure-history/staging/history/. allure-results/history/
          fi

      - name: Install Allure CLI
        if: always()
        run: |
          ALLURE_VERSION=2.34.1
          curl -sSL -o allure.tgz "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz"
          tar -xzf allure.tgz
          echo "$PWD/allure-${ALLURE_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Build Allure report with staging-only history
        if: always()
        run: |
          mkdir -p allure-history/staging
          allure generate allure-results --clean -o allure-history/staging

      - name: Publish staging Allure report
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
