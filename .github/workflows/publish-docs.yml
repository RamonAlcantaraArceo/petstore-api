name: Publish Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build-and-publish-docs:
    name: Build and publish MkDocs site
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: RamonAlcantaraArceo/petstore-test-python/.github/actions/setup-env@main
        with:
          python-version: '3.14'

      - name: Install Python deps for docs
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install mkdocs mkdocs-material mkdocstrings[python] pymdown-extensions

      - name: Build MkDocs site
        run: uv run mkdocs build --clean -d site

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Sync generated site to gh-pages/docs
        run: |
          mkdir -p gh-pages
          rm -rf gh-pages/docs
          mkdir -p gh-pages/docs
          cp -R site/. gh-pages/docs/

      - name: Commit and push docs to gh-pages
        env:
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"
        run: |
          cd gh-pages
          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add docs
          if git diff --staged --quiet; then
            echo "No changes to publish"
          else
            git commit -m "chore(docs): update site from main@${GITHUB_SHA}"
            git push origin HEAD:gh-pages
          fi

      - name: Post PR comment with docs URL
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = process.env.GITHUB_SHA;
            const siteUrl = `https://${process.env.GITHUB_REPOSITORY_OWNER}.github.io/${process.env.GITHUB_REPOSITORY.split('/')[1]}/docs`;
            core.info(`Looking up PRs associated with commit ${sha}`);
            const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });
            if (!pulls || pulls.data.length === 0) {
              core.info('No PRs associated with this commit');
              return;
            }
            const pr = pulls.data[0];
            const body = `Documentation published: **${siteUrl}**\n\nDeployed from commit: \\`${sha}\\`\n\nIf anything looks off, please open an issue.`;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });
        continue-on-error: true
