services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      STORAGE_MODE: memory
      API_KEY: ${API_KEY:-dev-api-key}
      APP_ENV: dev
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
