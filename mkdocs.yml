site_name: Petstore API
site_description: A production-ready Petstore API built with FastAPI
site_url: https://ramonalcantaraarceo.github.io/petstore-api/
repo_url: https://github.com/RamonAlcantaraArceo/petstore-api
repo_name: petstore-api

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    # - toc.integrate
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true

nav:
  - Home: index.md
  - Badges: badges.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Configuration: configuration.md
  - Rate Limiting: rate-limiting.md
  - Testing Guide: testing.md
  - Deployment: deployment.md
  - Changelog: changelog.md
  - Allure:
    - Allure History: allure-history-design.md
    - Allure Quick Reference: allure-quick-reference.md

markdown_extensions:
  - codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - toc:
      permalink: true
