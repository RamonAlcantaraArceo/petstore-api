services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: localpassword
      POSTGRES_DB: petstore
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petstore"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../..
      target: builder
    working_dir: /workspace
    volumes:
      - ../..:/workspace
      - ../../.e2e-coverage:/coverage
    environment:
      STORAGE_MODE: local
      DATABASE_URL: postgresql+asyncpg://petstore:localpassword@postgres:5432/petstore
      API_KEY: test-api-key
      APP_ENV: dev
      LOG_LEVEL: INFO
      COVERAGE_FILE: /coverage/.coverage.service
    command:
      - /bin/sh
      - -c
      - python -m pip install --no-cache-dir coverage && exec python -m coverage run --parallel-mode --save-signal=USR2 -m uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
