services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petstore"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STORAGE_MODE: local
      DATABASE_URL: postgresql+asyncpg://petstore:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/petstore
      API_KEY: ${API_KEY:-dev-api-key}
      APP_ENV: dev
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import sys,urllib.request; sys.exit(0) if urllib.request.urlopen(\"http://localhost:8000/health\").status==200 else sys.exit(1)' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
